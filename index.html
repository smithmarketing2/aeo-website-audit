<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is Your Website Costing You Customers? Get Your Free Audit | AEO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .headline-section {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 50px;
        }
        .headline {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
        }
        .subheadline {
            font-size: 1.1rem;
            color: #a0aec0;
        }
        .split-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            align-items: start;
        }
        .video-side {
            position: sticky;
            top: 20px;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: rgba(255, 255, 255, 0.05);
        }
        .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            object-fit: cover;
        }
        .form-side {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .form-subtitle {
            color: #a0aec0;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }
        .form-group input::placeholder {
            color: #6b7280;
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        .privacy-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6b7280;
            text-align: center;
        }
        #formMessage {
            display: none;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        /* Mobile: Stack vertically */
        @media (max-width: 900px) {
            .split-layout {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .video-side {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="headline-section">
            <h1 class="headline">Is Your Website Costing You Customers? Get Your Free Audit</h1>
            <p class="subheadline">Discover hidden issues hurting your rankings and conversions in 60 seconds</p>
        </div>
        
        <div class="split-layout">
            <div class="video-side">
                <div class="video-container">
                    <video controls playsinline>
                        <source src="https://media.publit.io/file/h_480/2f34e77c-bf64-4daa-959a-7737d11076c1-1.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
            
            <div class="form-side">
                <h2 class="form-title">Get Your Free Website Audit</h2>
                <p class="form-subtitle">Enter your details below and we'll analyze your site</p>
                <form id="leadForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="website">Website URL</label>
                        <input type="url" id="website" name="website" placeholder="https://yourwebsite.com" required>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">Get My Free Audit</button>
                    <div id="formMessage"></div>
                </form>
                <p class="privacy-text">We respect your privacy. Unsubscribe anytime.</p>
            </div>
        </div>
    </div>

    <script>
        // Global Control API Configuration
        const GC_API_KEY = '547b49b19c1bf6abb8abec2328d487221f4bc13c6b5359199001bf46d0e58ebe';
        const GC_BASE_URL = 'https://api.globalcontrol.io/api/ai';
        const GC_TAG_ID = '69e91ff580a5749c2a6e58a2'; // AEO Website Audit Lead tag

        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var btn = document.getElementById('submitBtn');
            var msg = document.getElementById('formMessage');
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            
            const formData = new FormData(this);
            const name = formData.get('name');
            const email = formData.get('email');
            const website = formData.get('website');
            
            try {
                // Step 1: Create or update contact in Global Control
                const contactResponse = await fetch(`${GC_BASE_URL}/contacts`, {
                    method: 'POST',
                    headers: {
                        'X-API-KEY': GC_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        firstName: name.split(' ')[0] || name,
                        lastName: name.split(' ').slice(1).join(' ') || '',
                        customFields: [
                            { key: 'website_url', value: website },
                            { key: 'lead_source', value: 'AEO Website Audit Lead Page' }
                        ]
                    })
                });
                
                const contactData = await contactResponse.json();
                
                if (contactData.type === 'response' && contactData.data) {
                    const contactId = contactData.data._id || contactData.data.id;
                    
                    // Step 2: Apply the tag
                    await fetch(`${GC_BASE_URL}/tags/fire-tag/${GC_TAG_ID}`, {
                        method: 'POST',
                        headers: {
                            'X-API-KEY': GC_API_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: email
                        })
                    });
                    
                    msg.style.display = 'block';
                    msg.className = 'success';
                    msg.textContent = 'Thanks! We\'ll send your audit within 24 hours.';
                    this.reset();
                } else {
                    throw new Error('Failed to create contact');
                }
                
            } catch (error) {
                console.error('Error:', error);
                msg.style.display = 'block';
                msg.className = 'error';
                msg.textContent = 'Something went wrong. Please try again.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Get My Free Audit';
            }
        });
    </script>
</body>
</html>
