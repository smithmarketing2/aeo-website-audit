<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AEO Website Audit | Smith Media Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .headline {
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subheadline {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 40px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            object-fit: cover;
        }
        .form-container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #e2e8f0;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .privacy-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #64748b;
        }
        #formMessage {
            display: none;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .success { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .benefits {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .benefit {
            background: rgba(99, 102, 241, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="headline">Get Your Free AEO Website Audit</h1>
        <p class="subheadline">Discover how to rank higher in AI search engines and get found by more local customers</p>
        
        <div class="benefits">
            <span class="benefit">✓ AI Search Optimization</span>
            <span class="benefit">✓ Local SEO Analysis</span>
            <span class="benefit">✓ Actionable Recommendations</span>
        </div>
        
        <div class="video-container">
            <video controls poster="">
                <source src="https://media.publit.io/file/h_720/2f34e77c-bf64-4daa-959a-7737d11076c1-1.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="form-container">
            <form id="leadForm" action="{{FORM_ACTION}}" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="business">Business Name</label>
                    <input type="text" id="business" name="business" placeholder="Your business name" required>
                </div>
                <div class="form-group">
                    <label for="website">Website URL</label>
                    <input type="url" id="website" name="website" placeholder="https://yourwebsite.com" required>
                </div>
                <input type="hidden" name="source" value="aeo-website-audit">
                <button type="submit" class="submit-btn" id="submitBtn">Get Instant Access</button>
                <div id="formMessage"></div>
            </form>
            <p class="privacy-text">🔒 Your information is secure. We never share your data.</p>
        </div>
    </div>

    <script>
        // API endpoint for form submission
        const FORM_ACTION = '/api/submit';
        
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var btn = document.getElementById('submitBtn');
            var msg = document.getElementById('formMessage');
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            
            var formData = new FormData(this);
            var data = {
                name: formData.get('name'),
                email: formData.get('email'),
                business: formData.get('business'),
                website: formData.get('website'),
                source: formData.get('source'),
                timestamp: new Date().toISOString()
            };
            
            fetch('/api/submit', {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(() => {
                msg.style.display = 'block';
                msg.className = 'success';
                msg.textContent = '✓ Success! Check your email for your audit.';
                document.getElementById('leadForm').reset();
            })
            .catch(() => {
                msg.style.display = 'block';
                msg.className = 'error';
                msg.textContent = 'Error submitting. Please try again.';
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Get Instant Access';
            });
        });
    </script>
</body>
</html>
